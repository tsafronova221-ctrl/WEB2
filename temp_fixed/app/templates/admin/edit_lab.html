{% extends "admin/base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/edit_lab.css') }}">
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="mb-4"><i class="fas fa-flask me-2"></i>Редактирование лабораторной работы</h1>

    <a href="{{ url_for('admin.admin_labs.export_passwords_xml', lab_id=lab.id) }}"
       class="btn btn-outline-secondary">
        <i class="fas fa-file-export me-1"></i> Экспорт паролей (Moodle XML)
    </a>

    <div class="lab-card">
        <div class="card-header bg-primary text-white">
            <h2 class="h5 mb-0">Основная информация</h2>
        </div>
        <div class="card-body">
            <form id="labForm">
                <div class="row g-3">
                    <div class="col-md-6">
                    <label class="form-label">Название *</label>
                    <input type="text" class="form-control" id="labName" value="{{ lab.title }}">

                    <div class="form-check form-switch mt-3">
                        <input class="form-check-input" type="checkbox" id="isTest"
                               {% if lab.is_test %}checked{% endif %} onchange="toggleTestMode()">
                        <label class="form-check-label" for="isTest" id="isTestLabel">
                            {{ "Контрольная работа" if lab.is_test else "Лабораторная работа" }}
                        </label>
                    </div>

                    <div id="questionsCountBlock" class="mt-2" style="display: {{ 'block' if lab.is_test else 'none' }};">
                        <label class="form-label small">Кол-во случайных вопросов:</label>
                        <input type="number" class="form-control" id="questionsCount"
                               value="{{ lab.questions_count }}" min="1">
                    </div>
                    <div id="testDurationBlock" class="mt-2" style="display: {{ 'block' if lab.is_test else 'none' }};">
                        <label class="form-label small">Время на тест (минут):</label>
                        <input type="number" class="form-control" id="testDuration"
                               value="{{ lab.test_duration or 0 }}" min="0">
                    </div>
                </div>

                    <div class="col-md-3">
                        <label class="form-label">Дата начала *</label>
                        <input type="datetime-local" class="form-control" id="labStart"
                               value="{{ lab.start_at.strftime('%Y-%m-%dT%H:%M') if lab.start_at }}">
                        <div class="invalid-feedback" id="labStartError"></div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Дедлайн *</label>
                        <input type="datetime-local" class="form-control" id="labDeadline"
                               value="{{ lab.deadline_at.strftime('%Y-%m-%dT%H:%M') if lab.deadline_at }}">
                        <div class="invalid-feedback" id="labDeadlineError"></div>
                    </div>
                </div>

                <div class="row g-3 mt-1">
                    <div class="col-md-6">
                        <label class="form-label">Группы *</label>
                        <div class="groups-box">
                            {% for g in groups %}
                            <div class="form-check">
                                <input class="form-check-input group-checkbox" type="checkbox"
                                       value="{{ g.id }}" id="group{{ g.id }}"
                                       {% if g in lab.groups %}checked{% endif %}>
                                <label class="form-check-label" for="group{{ g.id }}">{{ g.name }}</label>
                            </div>
                            {% endfor %}
                        </div>
                        <div class="invalid-feedback" id="groupsError"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" id="labDescription" rows="4">{{ lab.description or '' }}</textarea>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script> function toggleTestMode() {
                const isTest = document.getElementById('isTest').checked;
                const label = document.getElementById('isTestLabel');
                const countBlock = document.getElementById('questionsCountBlock');
                const durationBlock = document.getElementById('testDurationBlock');

                if (isTest) {
                    label.textContent = "Контрольная работа (Random)";
                    label.classList.add("text-danger", "fw-bold");
                    countBlock.style.display = "block";
                    durationBlock.style.display = "block";
                } else {
                    label.textContent = "Лабораторная работа (Все вопросы)";
                    label.classList.remove("text-danger", "fw-bold");
                    countBlock.style.display = "none";
                    durationBlock.style.display = "none";
                }
            }
            </script>
    <div class="lab-card mt-4">
        <div class="card-header bg-info text-white d-flex justify-content-between">
            <h2 class="h5 mb-0">Файлы (варианты)</h2>
            <button class="btn btn-light btn-sm" onclick="addNewFile()">+</button>
        </div>

        <div class="card-body">
            <div class="file-tabs" id="fileTabs"></div>
            <div class="file-content" id="fileContent"></div>
        </div>
    </div>

    <div class="lab-card mt-4">
        <div class="card-header bg-warning text-white d-flex justify-content-between">
            <h2 class="h5 mb-0">Вопросы</h2>
            <button class="btn btn-light btn-sm" onclick="addQuestion()">+</button>
        </div>
        <div class="card-body">
            <div id="questionsContainer"></div>
        </div>
    </div>

    <div class="action-buttons mt-4">
        <button class="btn btn-success btn-lg" onclick="saveLab()">Сохранить</button>
        <button class="btn btn-secondary btn-lg" onclick="location.reload()">Отменить</button>
    </div>
</div>

<script>
let files = [];
let questions = [];
let activeFile = null;
let questionCounter = 1;

document.addEventListener("DOMContentLoaded", () => {
    initData();
    renderFileTabs();
    renderQuestions();
});

function initData() {
    files = [
        {% for f in files %}
        { id: {{ f.id }}, name: "{{ f.name }}", action: "keep" }{% if not loop.last %},{% endif %}
        {% endfor %}
    ];

    questions = [
        {% for q in questions %}
        {
            id: {{ q.id }},
            number: {{ loop.index }},
            text: `{{ q.text|replace('`','\\`') }}`,
            answers: {
                {% set amap = answers.get(q.id, {}) %}
                {% for f in files %}
                {% if f.id in amap %}
                {{ f.id }}: `{{ amap[f.id]|replace('`','\\`') }}`{% if not loop.last %},{% endif %}
                {% endif %}
                {% endfor %}
            }
        }{% if not loop.last %},{% endif %}
        {% endfor %}
    ];

    if (files.length > 0) activeFile = files[0].id;
    if (questions.length === 0) addQuestion();
    else questionCounter = questions.length + 1;
}

function renderFileTabs() {
    const tabs = document.getElementById("fileTabs");
    const content = document.getElementById("fileContent");
    tabs.innerHTML = "";
    content.innerHTML = "";

    files.forEach(f => {
        tabs.insertAdjacentHTML("beforeend", `
            <div class="file-tab ${f.id === activeFile ? 'active' : ''}"
                 onclick="switchFile(${f.id})">${f.name}</div>
        `);
    });

    if (!activeFile) return;

    const f = files.find(x => x.id === activeFile);
    content.innerHTML = `
        <div class="file-panel">
            <div class="file-header">
                <h5>${f.name}</h5>
                <div class="file-actions">
                    <button class="btn btn-warning btn-sm" onclick="replaceFile(${f.id})">Заменить</button>
                    <button class="btn btn-danger btn-sm" onclick="deleteFile(${f.id})">Удалить</button>
                </div>
            </div>
            <div id="answersBox"></div>
        </div>
    `;

    renderAnswers();
}

function switchFile(id) {
    activeFile = id;
    renderFileTabs();
}

function renderAnswers() {
    const box = document.getElementById("answersBox");
    if (!box) return;

    let html = "";
    questions.forEach(q => {
        const val = q.answers[activeFile] || "";
        html += `
            <div class="answer-item">
                <label>${escapeHtml(q.text)}</label>
                <textarea data-q="${q.id}" rows="2">${val}</textarea>
            </div>
        `;
    });

    box.innerHTML = html;

    box.querySelectorAll("textarea").forEach(el => {
        el.addEventListener("input", e => {
            const qid = parseInt(e.target.dataset.q);
            const q = questions.find(x => x.id === qid);
            q.answers[activeFile] = e.target.value;
        });
    });
}

function addNewFile() {
    const input = document.createElement("input");
    input.type = "file";
    input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        const base64 = await getBase64(file);
        const id = Date.now();
        files.push({ id, name: file.name, base64, action: "add" });
        questions.forEach(q => q.answers[id] = "");
        activeFile = id;
        renderFileTabs();
    };
    input.click();
}

function replaceFile(id) {
    const input = document.createElement("input");
    input.type = "file";
    input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        const f = files.find(x => x.id === id);
        f.name = file.name;
        f.base64 = await getBase64(file);
        f.action = f.action === "add" ? "add" : "replace";
        renderFileTabs();
    };
    input.click();
}

function deleteFile(id) {
    if (!confirm("Удалить файл?")) return;
    const f = files.find(x => x.id === id);
    f.action = f.action === "add" ? "remove" : "delete";
    files = files.filter(x => x.id !== id);
    questions.forEach(q => delete q.answers[id]);
    activeFile = files.length ? files[0].id : null;
    renderFileTabs();
}

function renderQuestions() {
    const box = document.getElementById("questionsContainer");
    box.innerHTML = "";

    questions.forEach((q, i) => {
        box.insertAdjacentHTML("beforeend", `
            <div class="question-card">
                <div class="question-header">
                    <div class="question-number">${i + 1}</div>
                    <button class="btn btn-danger btn-sm" onclick="removeQuestion(${q.id})">🗑️</button>
                </div>
                <textarea class="form-control question-text" data-q="${q.id}" rows="3">${q.text}</textarea>
            </div>
        `);
    });

    box.querySelectorAll(".question-text").forEach(el => {
        el.addEventListener("input", e => {
            const qid = parseInt(e.target.dataset.q);
            const q = questions.find(x => x.id === qid);
            q.text = e.target.value;
            renderAnswers();
        });
    });
}

function addQuestion() {
    const id = Date.now();
    const q = { id, number: questionCounter++, text: "", answers: {} };
    files.forEach(f => q.answers[f.id] = "");
    questions.push(q);
    renderQuestions();
    renderAnswers();
}

function removeQuestion(id) {
    if (questions.length <= 1) return alert("Нужен хотя бы один вопрос");
    questions = questions.filter(q => q.id !== id);
    renderQuestions();
    renderAnswers();
}

function validateForm() {
    let ok = true;

    const name = document.getElementById("labName");
    if (name.value.trim().length < 3) {
        name.classList.add("is-invalid");
        ok = false;
    } else name.classList.remove("is-invalid");

    const start = document.getElementById("labStart");
    if (!start.value) { start.classList.add("is-invalid"); ok = false; }
    else start.classList.remove("is-invalid");

    const deadline = document.getElementById("labDeadline");
    if (!deadline.value) { deadline.classList.add("is-invalid"); ok = false; }
    else deadline.classList.remove("is-invalid");

    const groups = document.querySelectorAll(".group-checkbox:checked");
    if (!groups.length) { document.getElementById("groupsError").style.display = "block"; ok = false; }
    else document.getElementById("groupsError").style.display = "none";

    if (!files.length) { alert("Добавьте хотя бы один файл"); ok = false; }
    if (!questions.length) { alert("Добавьте хотя бы один вопрос"); ok = false; }

    return ok;
}

async function saveLab() {
    if (!validateForm()) return;

    const payload = {
        name: document.getElementById("labName").value.trim(),
        start_date: document.getElementById("labStart").value,
        deadline: document.getElementById("labDeadline").value,
        description: document.getElementById("labDescription").value.trim(),
        is_test: document.getElementById("isTest").checked,
        questions_count: parseInt(document.getElementById("questionsCount").value) || 0,
        test_duration: parseInt(document.getElementById("testDuration").value) || 0,
        groups: Array.from(document.querySelectorAll(".group-checkbox:checked")).map(x => x.value),
        files: files.map(f => ({
            id: f.id,
            name: f.name,
            action: f.action,
            base64: f.base64 || null
        })),
        questions: questions.map((q, i) => ({
            number: i + 1,
            text: q.text.trim(),
            answers: Object.entries(q.answers).map(([fid, val]) => ({
                file_id: parseInt(fid),
                correct_answer: val.trim()
            }))
        }))
    };

    const res = await fetch(`./{{ lab.id }}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (data.success) alert("Сохранено");
    else alert("Ошибка: " + data.error);
}

function getBase64(file) {
    return new Promise(r => {
        const reader = new FileReader();
        reader.onload = () => r(reader.result);
        reader.readAsDataURL(file);
    });
}

function escapeHtml(t) {
    return t.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
}
</script>
{% endblock %}
