<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление ЛР</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .navbar {
            background-color: #2c3e50;
            padding: 1rem 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .navbar-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
        }

        .nav-item {
            margin-left: 20px;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        .nav-link:hover {
            background-color: #3498db;
        }

        .nav-link.active {
            background-color: #3498db;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        @media (max-width: 768px) {
            .navbar-container {
                flex-direction: column;
            }

            .nav-menu {
                margin-top: 1rem;
            }

            .nav-item {
                margin-left: 10px;
                margin-right: 10px;
            }
        }
    </style>
</head>
{% block styles %}
{% endblock %}
<body>
    <!-- Навигационное меню -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="{{ url_for('admin.index') }}" class="logo">Управление ЛР</a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('admin.index') }}" class="nav-link {% if request.endpoint == 'admin.index' %}active{% endif %}">Главная</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin.admin_groups.edit_groups') }}" class="nav-link {% if request.endpoint == 'admin.admin_groups.edit_groups' %}active{% endif %}">Редактирование групп</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin.admin_labs.create_labs') }}" class="nav-link {% if request.endpoint == 'admin.admin_labs.create_labs' %}active{% endif %}">Создание лабораторных работ</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin.admin_labs.list_labs') }}" class="nav-link {% if request.endpoint == 'admin.admin_labs.list_labs' %}active{% endif %}">Редактирование лабораторных работ</a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin.admin_labs.select_lab_and_group') }}" class="nav-link {% if request.endpoint == 'admin.admin_labs.select_lab_and_group' %}active{% endif %}">Просмотр попыток</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Основной контент -->
    <div class="container">
        {% block content %}
        <!-- Основной контент будет здесь -->
        {% endblock %}
    </div>

    <!-- Подвал сайта -->
    <footer style="background-color: #2c3e50; color: white; text-align: center; padding: 1rem 0; margin-top: 2rem;">
        <div class="container">
            <p></p>
        </div>
    </footer>
</body>
</html>
