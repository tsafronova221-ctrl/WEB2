<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body {
            font-family: Arial, serif; background: #f4f4f4; }
        .login-box {
            width: 300px; margin: 100px auto; padding: 20px;
            background: white; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        input { width: 95%; padding: 10px; margin-bottom: 10px; }
        button { width: 100%; padding: 10px; background: #3498db; color: white; border: none; }
        .error { color: red; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Вход</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
        <input type="text" name="username" placeholder="Логин" required>
        <input type="password" name="password" placeholder="Пароль" required>
        <button type="submit">Войти</button>
    </form>
</div>
</body>
</html>
